# Builds the Jekyll operating record with Jekyll 4 and deploys to GitHub Pages.
# We build with our own Gemfile (Jekyll 4) rather than the classic github-pages
# pipeline, so we control the Ruby and gem versions.
#
# NOTE: deployment only runs once the Chairman approves making the repo public
# and enables Pages (Settings → Pages → Source: GitHub Actions). Until then this
# workflow is dormant.
name: Build and deploy operating record

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
