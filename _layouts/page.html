---
layout: default
---
<article class="page">
  <header class="page__header">
    <h1 class="page__title">{{ page.title }}</h1>
    {%- if page.summary -%}
      <p class="page__summary">{{ page.summary }}</p>
    {%- endif -%}
    {%- if page.updated -%}
      <p class="page__meta">Last updated <time datetime="{{ page.updated }}">{{ page.updated }}</time>.</p>
    {%- endif -%}
  </header>
  <div class="page__body prose">
    {{ content }}
  </div>
</article>
